<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Simple</title>
</head>

<body>

    <h1>Formulario de Registro</h1>

    <form>
        <label for="nombre">Nombre:</label><br>
        <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre">
        <br><br>

        <label for="correo">Correo electrónico:</label><br>
        <input type="email" id="correo" name="correo" placeholder="Escribe tu correo">
        <br><br>

        <label for="telefono">Teléfono:</label><br>
        <input type="tel" id="telefono" name="telefono" placeholder="Escribe tu teléfono">
        <br><br>

        <label for="mensaje">Mensaje:</label><br>
        <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje"></textarea>
        <br><br>

        <button type="submit">Enviar</button>
        <button type="reset">Limpiar</button>
    </form>

</body>

</html>
